<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>동양미래대학교 로봇소프트웨어과 - 자유게시판</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Top Header -->
    <header class="top-header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-graduation-cap" style="color: #0056b3; font-size: 24px;"></i>
                    <h1>동양미래대학교</h1>
                </a>
            </div>
            <nav class="top-nav">
                <a href="#">대학소개</a>
                <a href="#">입학</a>
                <a href="#" class="active">학부·학과</a>
                <a href="#">학사안내</a>
                <a href="#">대학생활</a>
                <a href="#">대학공지</a>
                <a href="#">대학뉴스</a>
                <a href="#">사이트맵</a>
                <a href="#" class="quick-menu">QUICK MENU</a>
                <div class="lang">KR <i class="fa-solid fa-caret-down"></i></div>
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <button class="login-btn">로그인</button>
            </nav>
        </div>
    </header>

    <!-- Sub Header -->
    <div class="sub-header">
        <div class="container sub-header-container">
            <h2><a href="index.html" style="color: white;">로봇소프트웨어과</a></h2>
            <nav class="sub-nav">
                <a href="#">학과소개</a>
                <a href="#">교육과정</a>
                <a href="#">교수소개</a>
                <a href="#">학과앨범</a>
                <a href="#">학과공지</a>
                <a href="#">전공동아리</a>
                <a href="board.html" class="active">자유게시판</a>
            </nav>
        </div>
    </div>

    <!-- Free Board View -->
    <main class="container main-content" id="board-view">
        <div class="board-container box-shadow">
            <div class="board-header">
                <h2>자유게시판</h2>
                <p>로봇소프트웨어과 학우들과 자유롭게 소통하는 공간입니다.</p>
                <div class="board-actions">
                    <a href="index.html" class="btn secondary" style="margin-right: 10px;"><i class="fa-solid fa-arrow-left"></i> 메인으로 돌아가기</a>
                    <button class="btn primary" onclick="showWriteModal()">글쓰기</button>
                </div>
            </div>
            
            <div class="board-list" id="post-list">
                <!-- Posts will be injected here via JS -->
            </div>
        </div>
    </main>

    <!-- Modal for Write / Edit -->
    <div class="modal" id="post-modal">
        <div class="modal-content box-shadow">
            <div class="modal-header">
                <h3 id="modal-title">새 글 쓰기</h3>
                <i class="fa-solid fa-xmark close-btn" onclick="closeModal()"></i>
            </div>
            <div class="modal-body">
                <input type="text" id="post-title" placeholder="제목을 입력하세요">
                <input type="text" id="post-author" placeholder="작성자 이름">
                <input type="password" id="post-password" placeholder="비밀번호 (수정/삭제 시 필요)">
                <textarea id="post-content" placeholder="내용을 입력하세요..." rows="10"></textarea>
                <input type="hidden" id="post-id">
            </div>
            <div class="modal-footer">
                <button class="btn secondary" onclick="closeModal()">취소</button>
                <button class="btn primary" onclick="savePost()">저장</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
